<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IRON GYM PRO - Hệ thống quản lý cao cấp | Admin & Trainers</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="appRoot">
    <div id="authContainer" class="auth-wrapper">
        <div id="loginCard" class="glass-card">
            <h2><i class="fas fa-dumbbell"></i> IRON GYM</h2>
            <p style="margin-bottom: 1.2rem;">Đăng nhập hệ thống quản lý PRO</p>
            <div class="input-field"><label>Tên đăng nhập</label><input type="text" id="loginUser" placeholder="admin / staff"></div>
            <div class="input-field"><label>Mật khẩu</label><input type="password" id="loginPass" placeholder="••••••"></div>
            <button class="btn-red" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
            <div class="switch-link">Chưa có tài khoản? <a href="#" id="toRegister">Đăng ký ngay</a></div>
        </div>
        
        <div id="registerCard" class="glass-card" style="display: none;">
            <h2><i class="fas fa-user-plus"></i> Đăng ký</h2>
            <div class="input-field"><label>Username</label><input type="text" id="regUser"></div>
            <div class="input-field"><label>Email</label><input type="email" id="regEmail"></div>
            <div class="input-field"><label>Mật khẩu</label><input type="password" id="regPass"></div>
            <button class="btn-red" id="registerBtn">Tạo tài khoản</button>
            <div class="switch-link"><a href="#" id="toLogin">← Quay lại đăng nhập</a></div>
        </div>
    </div>

    <div id="dashboardContainer" style="display: none;">
        <div class="dashboard">
            <div class="sidebar">
                <div class="sidebar-logo"><i class="fas fa-fire"></i><h2>REDGYM</h2></div>
                <div class="nav-item active" data-view="dashboard"><i class="fas fa-home"></i><span>Tổng quan</span></div>
                <div class="nav-item" data-view="members"><i class="fas fa-users"></i><span>Hội viên</span></div>
                <div class="nav-item" data-view="packages"><i class="fas fa-tag"></i><span>Gói tập</span></div>
                <div class="nav-item" data-view="trainers"><i class="fas fa-chalkboard-user"></i><span>Huấn luyện viên</span></div>
                <div class="nav-item" data-view="subscriptions"><i class="fas fa-id-card"></i><span>Đăng ký gói</span></div>
                <div class="nav-item" data-view="checkins"><i class="fas fa-fist-raised"></i><span>Check-in</span></div>
                <div class="nav-item" data-view="stats"><i class="fas fa-chart-pie"></i><span>Thống kê</span></div>
                <div class="nav-item" data-view="about"><i class="fas fa-info-circle"></i><span>Giới thiệu</span></div>
                
                <div class="nav-item" id="adminPanelNav" data-view="admin" style="display: none;"><i class="fas fa-user-shield"></i><span>Admin Panel</span></div>
                <div class="nav-item" id="logoutSide"><i class="fas fa-sign-out-alt"></i><span>Thoát</span></div>
            </div>
            
            <div class="main-panel">
                <div class="top-header">
                    <div class="page-title" id="dynamicTitle">IRON DASH</div>
                    <button class="logout-btn" id="logoutTop"><i class="fas fa-lock-open"></i> Đăng xuất</button>
                </div>
                <div id="viewContent" class="fade-up"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
